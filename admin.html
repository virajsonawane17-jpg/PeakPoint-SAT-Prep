<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0ea5e9" />
<title>Admin Questions — PeakPoint SAT Prep</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&family=Instrument+Sans:wght@400;500;600;700&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="app.css" />
<link rel="icon" href="logo.svg" />
</head>
<body>
<canvas id="space-canvas" aria-hidden="true"></canvas>
<nav class="navbar">
  <div class="nav-inner">
    <a href="dashboard.html" class="logo"><img src="logo.svg" alt="PeakPoint" class="logo-mark" width="28" height="28" /><span>PEAKPOINT SAT</span></a>
    <ul class="nav-links">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="question-bank.html">Bank</a></li>
      <li><a href="admin.html" class="active">Admin</a></li>
    </ul>
    <button class="mobile-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>
</nav>

<main class="app-main">
  <div class="dash-greeting">
    <div>
      <span class="eyebrow">Administrator</span>
      <h1>AI Question Generation</h1>
      <p class="card-sub">Generate original SAT-style questions with Gemini Flash. Drafts remain unpublished until approved.</p>
    </div>
  </div>

  <section class="app-section">
    <form class="card" id="admin-form">
      <div class="filter-grid">
        <div class="field"><label>Subject</label><select id="admin-subject"><option>Math</option><option>Reading and Writing</option><option>Vocabulary</option></select></div>
        <div class="field"><label>Domain</label><input id="admin-domain" placeholder="Algebra" /></div>
        <div class="field"><label>Skill</label><input id="admin-skill" placeholder="Linear equations" /></div>
        <div class="field"><label>Difficulty</label><select id="admin-difficulty"><option>Easy</option><option selected>Medium</option><option>Hard</option></select></div>
        <div class="field"><label>Question Type</label><input id="admin-type" placeholder="Multiple Choice" /></div>
        <div class="field"><label>Count</label><input id="admin-count" type="number" min="1" max="10" value="3" /></div>
      </div>
      <div class="field"><label>Additional Instructions</label><textarea id="admin-instructions" rows="4" placeholder="Focus on common SAT traps, keep numbers clean, include a concise explanation."></textarea></div>
      <button class="btn btn-primary btn-large" type="submit" id="admin-submit">Generate Drafts</button>
      <p class="card-sub" id="admin-status"></p>
    </form>
  </section>

  <section class="app-section">
    <div class="list-head">
      <h2>Review Queue</h2>
      <span class="muted mono" id="admin-count-label">0 drafts</span>
    </div>
    <div class="admin-review-list" id="admin-list"></div>
  </section>
</main>

<script src="vendor/supabase.js"></script>
<script src="supabase-config.js"></script>
<script src="auth.js"></script>
<script src="questions.js"></script>
<script src="game.js"></script>
<script src="api-client.js"></script>
<script src="learning.js"></script>
<script src="script.js"></script>
<script src="admin.js"></script>
</body>
</html>
