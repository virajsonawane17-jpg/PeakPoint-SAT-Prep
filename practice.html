<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#05050F" />
<meta name="description" content="Unlimited adaptive SAT practice on PeakPoint." />
<title>Practice — PeakPoint SAT Prep</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="app.css" />
<link rel="icon" href="logo.svg" />
</head>
<body>

<canvas id="space-canvas" aria-hidden="true"></canvas>

<nav class="navbar">
  <div class="nav-inner">
    <a href="dashboard.html" class="logo">
      <img src="logo.svg" alt="PeakPoint" class="logo-mark" width="28" height="28" />
      <span>PEAKPOINT SAT</span>
    </a>
    <ul class="nav-links">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="practice.html?mode=adaptive" class="active">Practice</a></li>
      <li><a href="resources.html">Resources</a></li>
      <li><button class="btn btn-secondary nav-cta" id="end-session-btn">End Session</button></li>
    </ul>
    <button class="mobile-toggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<main class="practice-wrap">

  <!-- HUD -->
  <div class="practice-hud">
    <span class="hud-pill" id="hud-mode">🧠 Adaptive Mission</span>
    <span class="hud-pill" id="hud-progress">Q 1</span>
    <span class="hud-pill" id="hud-combo">⚡ Combo ×0</span>
    <span class="hud-pill" id="hud-xp">+0 XP</span>
    <span class="hud-pill" id="hud-timer" style="display:none;">⏱️ 10:00</span>
  </div>

  <!-- Question -->
  <div class="question-card" id="question-card">
    <div class="q-meta">
      <span class="q-tag q-section" id="q-section">Math</span>
      <span class="q-tag" id="q-skill">Linear Equations</span>
      <span class="q-tag" id="q-diff">★☆☆</span>
    </div>
    <p class="q-text" id="q-text"></p>
    <div class="choices" id="choices"></div>
    <div class="explanation" id="explanation"></div>
    <div class="practice-actions">
      <span class="muted" id="session-stats" style="font-size:0.85rem;"></span>
      <button class="btn btn-primary" id="next-btn" style="display:none;">Next Question →</button>
    </div>
  </div>

  <!-- Summary (hidden until session ends) -->
  <div class="question-card summary-card" id="summary-card" style="display:none;">
    <div class="summary-icon" id="summary-icon">🚀</div>
    <h2 id="summary-title" style="font-family:var(--font-display);">Mission complete!</h2>
    <p class="card-sub" id="summary-sub"></p>
    <div class="summary-stats">
      <div><div class="s-num" id="sum-answered">0</div><div class="s-label">Answered</div></div>
      <div><div class="s-num" id="sum-accuracy">0%</div><div class="s-label">Accuracy</div></div>
      <div><div class="s-num" id="sum-xp">+0</div><div class="s-label">XP Earned</div></div>
      <div><div class="s-num" id="sum-combo">0</div><div class="s-label">Best Combo</div></div>
    </div>
    <div class="summary-badges" id="summary-badges"></div>
    <div style="display:flex; gap:14px; justify-content:center; flex-wrap:wrap;">
      <button class="btn btn-primary btn-large" id="again-btn">Practice Again</button>
      <a class="btn btn-secondary btn-large" href="dashboard.html">Back to Dashboard</a>
    </div>
  </div>

</main>

<div class="xp-toast" id="xp-toast">+10 XP</div>

<script src="auth.js"></script>
<script src="questions.js"></script>
<script src="game.js"></script>
<script src="script.js"></script>
<script src="practice.js"></script>
</body>
</html>
