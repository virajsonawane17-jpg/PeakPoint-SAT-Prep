<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0ea5e9" />
<meta name="description" content="PeakPoint SAT-style question bank." />
<title>Question Bank — PeakPoint SAT Prep</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&family=Instrument+Sans:wght@400;500;600;700&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="app.css" />
<link rel="icon" href="logo.svg" />
</head>
<body>
<canvas id="space-canvas" aria-hidden="true"></canvas>

<nav class="navbar">
  <div class="nav-inner">
    <a href="dashboard.html" class="logo">
      <img src="logo.svg" alt="PeakPoint" class="logo-mark" width="28" height="28" />
      <span>PEAKPOINT SAT</span>
    </a>
    <ul class="nav-links">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="study-plan.html">Plan</a></li>
      <li><a href="practice.html?mode=adaptive">Practice</a></li>
      <li><a href="question-bank.html" class="active">Bank</a></li>
      <li><a href="mistakes.html">Review</a></li>
      <li><a href="resources.html">Resources</a></li>
    </ul>
    <button class="mobile-toggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<main class="app-main">
  <div class="dash-greeting">
    <div>
      <span class="eyebrow">SAT-style practice</span>
      <h1>Question Bank</h1>
      <p class="card-sub">Original PeakPoint and approved SAT-style questions. Not official College Board content.</p>
    </div>
  </div>

  <section class="app-section">
    <div class="card filter-card">
      <div class="filter-grid">
        <div class="field"><label>Subject</label><select id="filter-subject"><option value="">All</option><option>Math</option><option>Reading and Writing</option></select></div>
        <div class="field"><label>Domain</label><select id="filter-domain"><option value="">All</option></select></div>
        <div class="field"><label>Skill</label><select id="filter-skill"><option value="">All</option></select></div>
        <div class="field"><label>Difficulty</label><select id="filter-difficulty"><option value="">All</option><option value="1">Easy</option><option value="2">Medium</option><option value="3">Hard</option></select></div>
        <div class="field"><label>Question Type</label><select id="filter-type"><option value="">All</option></select></div>
        <div class="field"><label>Status</label><select id="filter-status"><option value="">All</option><option value="completed">Completed</option><option value="uncompleted">Uncompleted</option></select></div>
        <div class="field"><label>History</label><select id="filter-accuracy"><option value="">All</option><option value="missed">Missed</option><option value="saved">Saved</option></select></div>
        <div class="field"><label>Source</label><select id="filter-source"><option value="">All</option><option value="peakpoint-original">PeakPoint Original</option><option value="ai-generated">Admin Approved AI</option></select></div>
      </div>
    </div>
  </section>

  <section class="bank-layout">
    <aside class="card bank-list">
      <div class="list-head">
        <h2>Results</h2>
        <span class="muted mono" id="result-count">0</span>
      </div>
      <div id="question-results"></div>
    </aside>

    <section class="question-card bank-question" id="bank-question">
      <div class="q-meta">
        <span class="q-tag q-section" id="bank-section">Math</span>
        <span class="q-tag" id="bank-domain">Domain</span>
        <span class="q-tag" id="bank-skill">Skill</span>
        <span class="q-tag" id="bank-diff">★☆☆</span>
      </div>
      <p class="q-text" id="bank-text"></p>
      <div class="choices" id="bank-choices"></div>
      <div class="question-tools">
        <button class="tool-btn" id="bank-save" type="button">Save</button>
        <button class="tool-btn" id="bank-collection" type="button">Add to Collection</button>
        <button class="tool-btn" id="bank-skip" type="button">Skip</button>
        <button class="tool-btn" id="bank-report" type="button">Report</button>
      </div>
      <div class="explanation" id="bank-explanation"></div>
      <div id="bank-ai-tutor"></div>
      <div class="practice-actions">
        <span class="muted" id="bank-status"></span>
        <button class="btn btn-primary" id="bank-next" type="button">Recommended Next →</button>
      </div>
    </section>
  </section>
</main>

<script src="vendor/supabase.js"></script>
<script src="supabase-config.js"></script>
<script src="auth.js"></script>
<script src="questions.js"></script>
<script src="game.js"></script>
<script src="api-client.js"></script>
<script src="learning.js"></script>
<script src="ai-tutor.js"></script>
<script src="script.js"></script>
<script src="question-bank.js"></script>
</body>
</html>
