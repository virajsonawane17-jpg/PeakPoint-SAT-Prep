<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0ea5e9" />
<title>Question Rush — PeakPoint SAT Prep</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&family=Instrument+Sans:wght@400;500;600;700&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="app.css" />
<link rel="icon" href="logo.svg" />
</head>
<body>
<canvas id="space-canvas" aria-hidden="true"></canvas>
<nav class="navbar">
  <div class="nav-inner">
    <a href="dashboard.html" class="logo"><img src="logo.svg" alt="PeakPoint" class="logo-mark" width="28" height="28" /><span>PEAKPOINT SAT</span></a>
    <ul class="nav-links">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="study-plan.html">Plan</a></li>
      <li><a href="practice.html?mode=adaptive">Practice</a></li>
      <li><a href="question-bank.html">Bank</a></li>
      <li><a href="mistakes.html">Review</a></li>
      <li><a href="resources.html">Resources</a></li>
    </ul>
    <button class="mobile-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>
</nav>

<main class="practice-wrap rush-wrap">
  <section class="card" id="rush-setup">
    <span class="eyebrow">Speed practice</span>
    <h1>Question Rush</h1>
    <div class="filter-grid" style="margin-top:22px;">
      <div class="field"><label>Duration</label><select id="rush-duration"><option value="180">3 minutes</option><option value="300">5 minutes</option><option value="600">10 minutes</option></select></div>
      <div class="field"><label>Mode</label><select id="rush-mode"><option value="mixed">Mixed practice</option><option value="math">Math</option><option value="rw">Reading and Writing</option><option value="vocab">Vocabulary</option><option value="weak">Weak-skills practice</option></select></div>
    </div>
    <button class="btn btn-primary btn-large" id="rush-start" type="button">Start Rush</button>
  </section>

  <section id="rush-game" style="display:none;">
    <div class="practice-hud">
      <span class="hud-pill" id="rush-timer">3:00</span>
      <span class="hud-pill" id="rush-streak">Streak 0</span>
      <span class="hud-pill" id="rush-best">Best 0</span>
      <span class="hud-pill" id="rush-accuracy">Accuracy —</span>
      <span class="hud-pill" id="rush-score">Score 0</span>
      <span class="hud-pill" id="rush-diff">★☆☆</span>
    </div>
    <div class="question-card">
      <div class="q-meta">
        <span class="q-tag q-section" id="rush-section"></span>
        <span class="q-tag" id="rush-skill"></span>
      </div>
      <p class="q-text" id="rush-text"></p>
      <div class="choices" id="rush-choices"></div>
    </div>
  </section>

  <section class="question-card summary-card" id="rush-summary" style="display:none;">
    <div class="summary-icon">⚡</div>
    <h2 style="font-family:var(--font-display);">Rush complete</h2>
    <div class="summary-stats">
      <div><div class="s-num" id="rush-total">0</div><div class="s-label">Completed</div></div>
      <div><div class="s-num" id="rush-correct">0</div><div class="s-label">Correct</div></div>
      <div><div class="s-num" id="rush-final-acc">0%</div><div class="s-label">Accuracy</div></div>
      <div><div class="s-num" id="rush-avg">0s</div><div class="s-label">Avg Time</div></div>
      <div><div class="s-num" id="rush-final-best">0</div><div class="s-label">Best Streak</div></div>
    </div>
    <div class="diagnostic-insights" id="rush-review"></div>
    <div class="ai-summary" id="rush-ai"></div>
    <div style="display:flex; gap:14px; justify-content:center; flex-wrap:wrap;">
      <button class="btn btn-primary btn-large" onclick="window.location.reload()">Rush Again</button>
      <a class="btn btn-secondary btn-large" href="dashboard.html">Dashboard</a>
    </div>
  </section>
</main>

<script src="vendor/supabase.js"></script>
<script src="supabase-config.js"></script>
<script src="auth.js"></script>
<script src="questions.js"></script>
<script src="game.js"></script>
<script src="api-client.js"></script>
<script src="learning.js"></script>
<script src="script.js"></script>
<script src="rush.js"></script>
</body>
</html>
